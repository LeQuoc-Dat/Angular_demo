
     <div class="content">
        <form   class="login_form" #loginForm = "ngForm" (ngSubmit)="onLogin(loginForm)" >
            <h1>Login</h1>
            <table>
                <tbody>
                    <tr>
                    <td><div class="login_form_item" >
                        <input name="username" minlength="4" type="text" ngModel required #username ='ngModel' placeholder="">
                        <label> Username
                             @if(controlHasError('required', 'minlength', 'username', loginForm))
                            {
                                @if(username.errors?.['required'])
                                {
                                    (Username is required)
                                }
                                @if(username.errors?.['minlength'])
                                {
                                    (Username is invalid)
                                }
                            }
                            
                        </label>
                        
                    </div>
                    </td>
                </tr>
                  <tr>
                    <td><div class="login_form_item">
                        <input type="password" minlength="4" name="password" placeholder="" ngModel required #password ='ngModel'>
                        <label>Password
                         @if(controlHasError('required', 'minlength','password', loginForm))
                            {
                                @if(password.errors?.['required'])
                                {
                                    (Password is required)
                                }
                                @if(password.errors?.['minlength'])
                                {
                                    (Password is invalid)
                                }
                            }
                        </label>
                    </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="2"><div class="forgot_password_text">
                        <a href="">Forgot password?</a>
                    </div></td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="submit" class="btn_login" value="Login">
                    </td>
                </tr>
                </tbody>
                
            </table>

            <div class="sign_up_social">
                <span>Or Sign Up Using</span>
                <div class="social-links-container">
                    <a href=""><img class="social_icon" src="assets/icons/facebook_logo.png" alt="facebook"></a>
                    <a href=""><img class="social_icon" src="assets/icons/google_logo.png" alt="google"></a>
                    <a href=""><img class="social_icon" src="assets/icons/X_logo.png" alt="X"></a>
                </div>
            </div>
            <div class="sign_up_bottom">
                <p>Have not a account yet</p>
                <button class="btn_sign_up" type="button">SIGN UP</button>
            </div>
        </form>
    </div>
